spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:db}:3306/${DB_DATABASE:auth_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:appuser}
    password: ${DB_PASSWORD:apppassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.timeout: 5000
      mail.smtp.connectiontimeout: 5000

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default_secret_key_for_dev_only_change_in_production}
  access-token-validity-in-seconds: 3600 # 1hour
  refresh-token-validity-in-seconds: 604800 # 7days
